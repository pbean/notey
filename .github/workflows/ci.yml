name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
          components: clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev webkit2gtk-driver

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
            notey-cli/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'notey-cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Rust lint (clippy)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests (Windows)
        if: runner.os == 'Windows'
        working-directory: src-tauri
        # The lib test binary links Tauri's full GUI runtime (tray-icon, wry)
        # which fails to load on CI with STATUS_ENTRYPOINT_NOT_FOUND.
        # Skip --lib (only export_bindings, covered on Linux/macOS) and run
        # integration tests only. See: tauri-apps/tauri#13419
        run: cargo test --no-default-features --test db_tests --test acl_tests

      - name: Rust tests (non-Windows)
        if: runner.os != 'Windows'
        working-directory: src-tauri
        run: cargo test

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend tests (Linux — xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run npx vitest run

      - name: Frontend tests (non-Linux)
        if: runner.os != 'Linux'
        run: npx vitest run

      - name: Install tauri-driver (Linux)
        if: runner.os == 'Linux'
        run: cargo install --force --locked tauri-driver

      - name: Build debug binary (Linux)
        if: runner.os == 'Linux'
        run: npx tauri build --debug --no-bundle

      - name: Build notey-cli (Linux)
        # The CLI live-sync E2E suite spawns the standalone `notey` binary from
        # notey-cli/target/debug/. It's a separate, workspace-less crate not built
        # by the tauri build above, so build it explicitly before E2E.
        if: runner.os == 'Linux'
        working-directory: notey-cli
        run: cargo build

      - name: E2E tests (Linux)
        if: runner.os == 'Linux'
        # WebKitGTK's accelerated compositing / DMABUF renderer crashes the web
        # process under a GPU-less virtual framebuffer, hanging the WebDriver run.
        # Force software rendering. run.mjs also sets these as a fallback; they are
        # mirrored here for visibility. WEBKIT_DISABLE_COMPOSITING_MODE is the
        # official Tauri WebDriver CI recommendation.
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
          WEBKIT_DISABLE_DMABUF_RENDERER: 1
          LIBGL_ALWAYS_SOFTWARE: 1
        run: xvfb-run node e2e/run.mjs
