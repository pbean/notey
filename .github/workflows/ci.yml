name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
          components: clippy

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev webkit2gtk-driver

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Rust lint (clippy)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests (Windows)
        if: runner.os == 'Windows'
        working-directory: src-tauri
        # The lib test binary links Tauri's full GUI runtime (tray-icon, wry)
        # which fails to load on CI with STATUS_ENTRYPOINT_NOT_FOUND.
        # Skip --lib (only export_bindings, covered on Linux/macOS) and run
        # integration tests only. See: tauri-apps/tauri#13419
        run: cargo test --no-default-features --test db_tests --test acl_tests

      - name: Rust tests (non-Windows)
        if: runner.os != 'Windows'
        working-directory: src-tauri
        run: cargo test

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Frontend tests (Linux — xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run npx vitest run

      - name: Frontend tests (non-Linux)
        if: runner.os != 'Linux'
        run: npx vitest run

      - name: Install tauri-driver (Linux)
        if: runner.os == 'Linux'
        run: cargo install tauri-driver

      - name: Build debug binary (Linux)
        if: runner.os == 'Linux'
        run: npx tauri build --debug --no-bundle

      - name: E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run node e2e/run.mjs
