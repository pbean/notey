name: Release

# Builds and uploads Notey bundles for all five targets required by AC4 of
# story 8.6 — Windows x64, macOS x64, macOS ARM64, Linux x64, Linux ARM64 —
# to a draft GitHub Release from a release tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      releaseTag:
        description: 'Existing release tag to build, e.g. v1.2.3'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    permissions:
      contents: write # required to create the GitHub Release and upload assets
    strategy:
      fail-fast: false # one target failing must not cancel the others
      matrix:
        include:
          - platform: macos-latest # macOS ARM64 (Apple Silicon)
            args: '--target aarch64-apple-darwin'
          - platform: macos-15-intel # macOS x64 (Intel)
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04 # Linux x64
            args: ''
          - platform: ubuntu-22.04-arm # Linux ARM64 (native GitHub-hosted ARM runner)
            args: ''
          - platform: windows-latest # Windows x64
            args: ''

    name: ${{ matrix.platform }} ${{ matrix.args }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v.+ ]]; then
            echo "releaseTag must match the release tag pattern v*"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.releaseTag || github.ref }}

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        # Pinned nightly required by specta =2.0.0-rc.24 (see rust-toolchain.toml).
        # On macOS, install both apple-darwin targets so each matrix job can
        # cross-build its single architecture via the --target arg.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
          targets: ${{ startsWith(matrix.platform, 'macos-') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release Notey
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (NOT OS code-signing). Signs each bundle and
          # assembles latest.json so the in-app auto-updater trusts the release.
          # Create ONE repo secret: TAURI_SIGNING_PRIVATE_KEY = contents of the
          # private key from `tauri signer generate`. The key has no passphrase, so
          # do NOT create the PASSWORD secret (GitHub rejects empty secret values) —
          # the reference below resolves to an empty string when the secret is
          # absent, which is exactly "no password". Without the key the build still
          # runs but produces no .sig/latest.json and auto-update will not work.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          #
          # --- OS code-signing (intentionally OFF; unsigned v1) ----------------
          # Releases are unsigned today; users follow the "open anyway" flow (see
          # docs/installation.md). To enable later, add the secrets below — no
          # other workflow change is needed (Tauri auto-signs when they exist):
          #
          # macOS (Developer ID, $99/yr — Tauri auto-signs AND notarizes):
          #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}      # app-specific pw
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          #
          # Windows (Azure Trusted Signing — also add a bundle.windows.signCommand
          # using trusted-signing-cli in tauri.conf.json):
          #   AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          #   AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          #   AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.releaseTag || github.ref_name }}
          releaseName: Notey ${{ github.event_name == 'workflow_dispatch' && inputs.releaseTag || github.ref_name }}
          releaseBody: 'See the assets below to download and install this version.'
          # Draft so a human reviews unsigned artifacts before publishing. NOTE:
          # the updater endpoint (releases/latest/download/latest.json) only
          # resolves once the draft is PUBLISHED and marked "latest" — auto-update
          # goes live at publish time, not at build time.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
